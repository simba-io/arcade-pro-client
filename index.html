<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css">
    <title>Pixi.js Bunny Example</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #e0f7fa; }
        header, footer { background: #00796b; color: #fff; padding: 1rem; text-align: center; }
        main { min-height: 70vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #pixi-container { width: 100vw; height: 60vh; display: flex; align-items: center; justify-content: center; }
        section { margin: 2rem 0; }
    </style>
</head>

<body>
    <header>
        <h1>Welcome to the Bunny Showcase!</h1>
    </header>
    <main>
        <section>
            <h2>Our Famous Bunny</h2>
            <div id="pixi-container"></div>
        </section>
    </main>
    <footer>
        Contact: bunny@example.com
    </footer>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
